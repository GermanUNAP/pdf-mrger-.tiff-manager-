{% extends "base.html" %}
{% block title %}Registro - PDF Tools{% endblock %}

{% block content %}
<div class="form-card" style="max-width:480px; margin:4rem auto;">
  <h1>Crear cuenta</h1>
  <form method="POST">
    <div class="form-group">
      <label for="username">Usuario</label>
      <input type="text" id="username" name="username" required autocomplete="username">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label for="confirm">Confirmar contraseña</label>
      <input type="password" id="confirm" name="confirm" required minlength="6" autocomplete="new-password">
    </div>
    <button type="submit" class="btn-primary">Registrarse</button>
  </form>
  <p style="margin-top:1rem;">
    ¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión</a>
  </p>
</div>
{% endblock %}
