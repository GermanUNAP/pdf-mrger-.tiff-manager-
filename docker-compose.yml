services:

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: pdfuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: pdfmerger
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdfuser -d pdfmerger"]
      interval: 10s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY?err}
      DATABASE_URL: postgresql://pdfuser:${POSTGRES_PASSWORD:-changeme}@postgres:5432/pdfmerger
      FLASK_ENV: production
    volumes:
      - uploads:/tmp/pdfmerger_uploads

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    depends_on:
      - app

volumes:
  pgdata:
  uploads:
  certbot-www:
  certbot-certs:
