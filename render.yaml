services:
  - type: web
    name: pdf-merger
    runtime: docker
    repo: https://github.com/tuusuario/pdf-merger
    plan: free
    region: ohio
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pdf-merger-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: SESSION_LIFETIME_DAYS
        value: "30"
      - key: MAX_CONTENT_LENGTH
        value: "524288000"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: OAUTH_REDIRECT_URI
        sync: false
    healthCheckPath: /
    autoDeploy: true

databases:
  - name: pdf-merger-db
    plan: free
    region: ohio
    postgresMajorVersion: 17
